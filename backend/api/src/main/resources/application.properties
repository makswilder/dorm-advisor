spring.datasource.url=jdbc:postgresql://localhost:5432/dormadvisor
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT — replace secret with a base64-encoded 32+ byte value in production
app.jwt.secret=ZG9ybUFkdmlzb3JKd3RTZWNyZXRLZXlGb3JIUzI1NkFsZ29yaXRobTIwMjY=
app.jwt.expiry-hours=1

# Magic link token expiry
app.auth.token-expiry-minutes=15

# Mail (Mailpit for local dev — see compose.yaml)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Google OAuth2 — replace with real credentials from Google Cloud Console
# Redirect URI to register in Google Console: http://localhost:8080/api/auth/google/callback
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/google/callback

spring.docker.compose.enabled=false

# Multipart file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# Photo storage
app.photo.upload-dir=./uploads/photos
app.photo.max-width=1920
app.photo.max-height=1080
app.photo.quality=0.80
