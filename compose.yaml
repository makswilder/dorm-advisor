services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432'

  mailpit:
    image: axllent/mailpit
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI — http://localhost:8025
